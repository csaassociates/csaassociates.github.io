<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSA & Associates</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f4f6fb;
    color:#1A1A1A;
}

/* HEADER */
header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 90px;
    background:#0A1F44;
    color:white;
}

.logo {
    display:flex;
    align-items:center;
}

.logo img {
    height:52px;
    background:white;
    padding:6px;
    border-radius:8px;
    margin-right:12px;
}

nav a {
    color:white;
    margin-left:30px;
    text-decoration:none;
    font-size:14px;
    opacity:0.9;
}

/* HERO */
.hero {
    background:linear-gradient(135deg,#0A1F44,#1d3c85);
    color:white;
    padding:160px 20px;
    text-align:center;
}
