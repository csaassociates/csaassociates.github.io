<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:#0b132b;
    color:white;
}

/* HEADER */
header {
    display:flex;
    justify-content:space-between;
    padding:20px 80px;
    background:#0A1F44;
}

nav a {
    color:white;
    margin-left:25px;
}

/* HERO */
.hero {
    padding:140px 20px;
    text-align:center;
    background:linear-gradient(135deg,#0A1F44,#1f3c88);
}

.hero h1 {font-size:48px;}

/* SECTION */
.section {padding:80px 10%;text-align:center;}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

/* CARD */
.card {
    background:white;
    color:black;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-10px);
}

/* FOOTER */
footer {
    background:black;
    text-align:center;
    padding:25px;
}
</style>
